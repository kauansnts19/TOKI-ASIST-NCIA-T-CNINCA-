<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toki Corporation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">

  <!-- Top Bar -->
  <div class="header-top text-white py-2 text-sm">
    <div class="max-w-7xl mx-auto flex justify-between items-center px-6">
      <div>Olá, seja bem-vindo(a)!</div>
      <div class="flex items-center gap-6">
        <a href="#" class="flex items-center gap-2 hover:text-blue-400 transition">
          <i class="fas fa-phone"></i>
          <span>(41) 3055-2555</span>
        </a>
        <a href="#" class="hover:text-blue-400 transition">Rastrear minha compra</a>
        <div class="flex gap-4 text-lg">
          <i class="fab fa-facebook-f hover:text-blue-400 cursor-pointer"></i>
          <i class="fab fa-instagram hover:text-pink-400 cursor-pointer"></i>
          <i class="fab fa-youtube hover:text-red-500 cursor-pointer"></i>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Header -->
  <header class="main-header text-white py-4 shadow-lg">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
      
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center text-white font-bold text-2xl">
          T
        </div>
        <div>
          <h1 class="text-2xl font-bold tracking-tight">TOKI</h1>
          <p class="text-xs text-blue-400 -mt-1">CORPORATION</p>
        </div>
      </div>

      <!-- Search -->
      <div class="flex-1 max-w-2xl mx-8">
        <div class="relative">
          <input type="text" placeholder="O que você procura?" 
                 class="w-full py-3 px-5 rounded-full text-black focus:outline-none focus:ring-2 focus:ring-blue-500">
          <button class="absolute right-4 top-1/2 -translate-y-1/2 bg-blue-600 text-white p-2 rounded-full hover:bg-blue-700">
            <i class="fas fa-search"></i>
          </button>
        </div>
      </div>

      <!-- Account & Cart -->
      <div class="flex items-center gap-8">
        <a href="#" class="flex items-center gap-2 hover:text-blue-400 transition">
          <i class="fas fa-user text-2xl"></i>
          <span class="text-sm font-medium">Minha conta</span>
        </a>
        <a href="#" class="flex items-center gap-2 relative hover:text-blue-400 transition">
          <i class="fas fa-shopping-bag text-3xl"></i>
          <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Categories -->
  <div class="max-w-7xl mx-auto py-8 px-6">
    <div class="grid grid-cols-3 md:grid-cols-6 lg:grid-cols-9 gap-6 text-center">
      <!-- Os 9 ícones de categorias aqui (mesmo do código anterior) -->
      <!-- ... (copie os 9 cards da resposta anterior se precisar) ... -->
    </div>
  </div>

</body>
</html>
