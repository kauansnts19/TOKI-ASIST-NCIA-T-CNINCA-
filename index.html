<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOKI.co - Assistência Técnica em Curitiba</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

  <!-- Barra Superior -->
  <header class="top-bar">
    <div class="container">
      <span>Olá, seja bem-vindo(a)!</span>
      <a href="tel:4130552555" class="contact">
        <i class="fas fa-phone"></i> (41) 3055-2555
      </a>
      <a href="#" class="track">
        <i class="fas fa-truck"></i> Rastrear minha compra
      </a>
      <div class="social">
        <i class="fab fa-facebook-f"></i>
        <i class="fab fa-instagram"></i>
        <i class="fab fa-youtube"></i>
      </div>
    </div>
  </header>

  <!-- Header Principal -->
  <header class="main-header">
    <div class="container">
      <a href="#" class="logo">
        <div class="logo-icon"><span>T</span></div>
        <div class="logo-text">
          <strong>TOKI.co</strong><br>
          <small>CORPORATION</small>
        </div>
      </a>

      <div class="search-bar">
        <input type="text" placeholder="O que você procura?">
        <button><i class="fas fa-search"></i></button>
      </div>

      <div class="user-actions">
        <a href="#" class="account">
          <i class="fas fa-user"></i>
          <span>Minha conta</span>
        </a>
        <a href="#" class="cart">
          <i class="fas fa-shopping-bag"></i>
          <span class="cart-count">0</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Categorias -->
  <nav class="categories">
    <div class="container">
      <a href="#" class="category-item">
        <i class="fas fa-mobile-alt"></i>
        <span>TELAS CELULARES</span>
      </a>
      <a href="#" class="category-item">
        <i class="fas fa-headphones"></i>
        <span>ACESSÓRIOS</span>
      </a>
      <!-- ... outros itens ... -->
    </div>
  </nav>

</body>
</html>
